<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Style POS Shortcuts</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f19;
      color: #e2e8f0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      font-size: 28px;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
    }

    .toggle-section {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle-status {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
    }

    /* Custom Toggle Switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: #6366f1;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .shortcuts-quick {
      margin-bottom: 12px;
    }

    .shortcuts-quick-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .shortcut-row .key {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #818cf8;
      font-family: 'Consolas', monospace;
    }

    .shortcut-row .desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 12px 0;
    }

    .hint {
      text-align: center;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.25);
      padding: 8px 0 0;
    }

    .hint kbd {
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⌨️</span>
    <div>
      <div class="title">Life Style POS</div>
      <div class="subtitle">Keyboard Shortcuts Extension</div>
    </div>
  </div>

  <div class="toggle-section">
    <div>
      <div class="toggle-label">Shortcuts</div>
      <div class="toggle-status" id="statusText">Active</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="shortcuts-quick">
    <div class="shortcuts-quick-title">Essential Shortcuts</div>
    <div class="shortcut-row">
      <span class="desc">Discount</span>
      <span class="key">F5</span>
    </div>
    <div class="shortcut-row">
      <span class="desc">Hold / Save / Print</span>
      <span class="key">F6 F7 F8</span>
    </div>
    <div class="shortcut-row">
      <span class="desc">Payment Methods</span>
      <span class="key">F9-F12</span>
    </div>
    <div class="shortcut-row">
      <span class="desc">New Bill</span>
      <span class="key">Ctrl+N</span>
    </div>
    <div class="shortcut-row">
      <span class="desc">Quick Sale</span>
      <span class="key">F2</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="hint">
    Press <kbd>?</kbd> on the POS page for full reference
  </div>

  <script src="popup.js"></script>
</body>
</html>
